<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - Admin Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="top-bar">
        <div class="top-left">
            <span class="admin-panel-title">Admin Panel</span>
        </div>
        <div class="top-center">
            <a href="dashboard.html" style="text-decoration:none;"><h1 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin: 0;">QueueSmart</h1></a>
        </div>
        <div class="top-right" style="align-items: center;">
            <button class="icon-btn" id="adminToggleBtn" title="Back to Dashboard" onclick="toggleAdminPanel()" style="display:none;">👨🏻‍💻</button>
            <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()" style="margin-top:0; vertical-align:middle;">Logout</button>
        </div>
    </header>
<main class="dashboard">
    <div class="card fade-in">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom: 24px;">
            <button class="primary-btn" style="width:auto; padding:10px 16px;" onclick="window.location.href='service-management.html'">Service Management</button>
            <h3 style="text-align:center; font-size:1.45rem; margin: 0; flex:1;">Services Overview</h3>
            <button class="primary-btn" style="width:auto; padding:10px 16px;" onclick="window.location.href='queue-management.html'">Queue Management</button>
        </div>
        <table class="service-table">
            <thead>
                <tr>
                    <th>Service Name</th>
                    <th>Queue Length</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="servicesOverviewBody">
                <tr>
                    <td colspan="4" style="text-align:center; color:#6b7280; padding:24px;">Loading services...</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<script>
const API_BASE_URL = 'http://localhost:3000/api';

function renderServicesOverview(services) {
    const body = document.getElementById('servicesOverviewBody');
    if (!body) return;

    if (!services.length) {
        body.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#6b7280; padding:24px;">No services found.</td></tr>';
        return;
    }

    body.innerHTML = services.map(service => {
        const isActive = Number(service.isActive) === 1 || service.isActive === true;
        const statusText = isActive ? 'Open' : 'Closed';
        const statusClass = isActive ? 'waiting' : '';
        const actionText = isActive ? 'Close Queue' : 'Open Queue';
        const actionClass = isActive ? 'close' : 'open';
        const nextState = isActive ? 0 : 1;

        return `
            <tr>
                <td>${service.serviceName}</td>
                <td>${service.queueLength ?? 0}</td>
                <td><span class="status ${statusClass}">${statusText}</span></td>
                <td class="service-actions">
                    <button class="action-btn ${actionClass}" data-service-id="${service.id}" data-next-state="${nextState}">${actionText}</button>
                </td>
            </tr>
        `;
    }).join('');
}

async function loadServicesOverview() {
    const body = document.getElementById('servicesOverviewBody');
    if (body) {
        body.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#6b7280; padding:24px;">Loading services...</td></tr>';
    }

    try {
        const response = await fetch(`${API_BASE_URL}/services`);
        const data = await response.json();

        if (!response.ok || !Array.isArray(data)) {
            throw new Error('Failed to load services');
        }

        renderServicesOverview(data);
    } catch (err) {
        console.error('Failed to load services overview:', err);
        if (body) {
            body.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#ef4444; padding:24px;">Failed to load services.</td></tr>';
        }
    }
}

async function toggleServiceStatus(serviceId, nextState) {
    const response = await fetch(`${API_BASE_URL}/services/${serviceId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ isActive: Boolean(nextState) })
    });

    const data = await response.json();
    if (!response.ok || !data.success) {
        throw new Error(data.error || 'Failed to update service status');
    }
}

document.getElementById('servicesOverviewBody').addEventListener('click', async (event) => {
    const button = event.target.closest('button[data-service-id]');
    if (!button) return;

    const serviceId = Number(button.dataset.serviceId);
    const nextState = Number(button.dataset.nextState);

    if (Number.isNaN(serviceId) || Number.isNaN(nextState)) return;

    button.disabled = true;

    try {
        await toggleServiceStatus(serviceId, nextState);
        await loadServicesOverview();
    } catch (err) {
        console.error('Failed to update service status:', err);
        alert(err.message || 'Failed to update service status.');
        button.disabled = false;
    }
});

function getStoredUser() {
    const raw =
        localStorage.getItem('queuesmartUser') ||
        localStorage.getItem('user');

    if (!raw) return null;

    try {
        return JSON.parse(raw);
    } catch {
        return null;
    }
}

function isAdminUser(user) {
    if (!user || !user.role) return false;
    const role = String(user.role).toLowerCase();
    return role === 'admin' || role === 'administrator';
}

function toggleAdminPanel() {
    window.location.href = 'dashboard.html';
}

function setupAdminToggle() {
    const btn = document.getElementById('adminToggleBtn');
    if (!btn) return;
    const user = getStoredUser();
    if (isAdminUser(user)) {
        btn.style.display = 'flex';
    }
}

function logout() {
        if (confirm("Are you sure you want to logout?")) {
            localStorage.removeItem("user");
            localStorage.removeItem("token");
            localStorage.removeItem("queuesmartUser");
            window.location.href = "index.html";
        }
    }

setupAdminToggle();
loadServicesOverview();
</script>
<div class="toast-container" id="toastContainer"></div>
<script src="js/notifications.js"></script>
</body>
</html>
