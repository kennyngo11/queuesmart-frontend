<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - Admin Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="dashboard">
    <header class="top-bar">
        <div class="top-left">
            <span class="admin-panel-title">Admin Panel</span>
        </div>
        <div class="top-center">
            <a href="dashboard.html" style="text-decoration:none;"><h1 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin: 0;">QueueSmart</h1></a>
        </div>
        <div class="top-right" style="align-items: center;">
            <button class="icon-btn" id="adminToggleBtn" title="Back to Dashboard" onclick="toggleAdminPanel()" style="display:none;">👨🏻‍💻</button>
            <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()" style="margin-top:0; vertical-align:middle;">Logout</button>
        </div>
    </header>
    <div class="card fade-in">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom: 24px;">
            <button class="primary-btn" style="width:auto; padding:10px 16px;" onclick="window.location.href='service-management.html'">Service Management</button>
            <h3 style="text-align:center; font-size:1.45rem; margin: 0; flex:1;">Services Overview</h3>
            <button class="primary-btn" style="width:auto; padding:10px 16px;" onclick="window.location.href='queue-management.html'">Queue Management</button>
        </div>
        <table class="service-table">
            <thead>
                <tr>
                    <th>Service Name</th>
                    <th>Queue Length</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Academic Advising</td>
                    <td>5</td>
                    <td><span class="status waiting">Open</span></td>
                    <td class="service-actions">
                        <button class="action-btn close">Close Queue</button>
                    </td>
                </tr>
                <tr>
                    <td>IT Help Desk</td>
                    <td>2</td>
                    <td><span class="status waiting">Open</span></td>
                    <td class="service-actions">
                        <button class="action-btn close">Close Queue</button>
                    </td>
                </tr>
                <tr>
                    <td>Student Services</td>
                    <td>0</td>
                    <td><span class="status waiting">Closed</span></td>
                    <td class="service-actions">
                        <button class="action-btn open">Open Queue</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<script>
function getStoredUser() {
    const raw =
        localStorage.getItem('queuesmartUser') ||
        localStorage.getItem('user');

    if (!raw) return null;

    try {
        return JSON.parse(raw);
    } catch {
        return null;
    }
}

function isAdminUser(user) {
    if (!user || !user.role) return false;
    const role = String(user.role).toLowerCase();
    return role === 'admin' || role === 'administrator';
}

function toggleAdminPanel() {
    window.location.href = 'dashboard.html';
}

function setupAdminToggle() {
    const btn = document.getElementById('adminToggleBtn');
    if (!btn) return;
    const user = getStoredUser();
    if (isAdminUser(user)) {
        btn.style.display = 'flex';
    }
}

function logout() {
        if (confirm("Are you sure you want to logout?")) {
            localStorage.removeItem("user");
            localStorage.removeItem("token");
            localStorage.removeItem("queuesmartUser");
            window.location.href = "index.html";
        }
    }

setupAdminToggle();
</script>
<div class="toast-container" id="toastContainer"></div>
<script src="js/notifications.js"></script>
</body>
</html>
