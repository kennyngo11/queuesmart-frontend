<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - Queue Status</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="top-bar">
        <div class="top-left">
            <span class="welcome-text">Queue Status</span>
        </div>
        <div class="top-center">
            <h1>QueueSmart</h1>
        </div>
        <div class="top-right">
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>
    <main class="dashboard">
        <div class="card-grid">
            <section class="card">
                <h2>Queue Status</h2>

                <p><strong>Current Position:</strong> <span id="position">#4</span></p>
                <p><strong>Estimated Wait:</strong> <span id="wait">12 minutes</span></p>
                <p><strong>Status:</strong> <span id="status" class="status waiting">Waiting</span></p>

                <div class="progress" aria-label="Queue progress">
                    <div id="progressFill" class="progress-fill" style="width: 30%;"></div>
                </div>

                <button class="primary-btn" onclick="leaveQueue()">Leave Queue</button>
            </section>
        </div>
    </main>
    <script>
        function leaveQueue() {
            alert("This would take you out of the queue");
        }

        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        setTimeout(() => {
            document.getElementById("status").innerText = "Almost Ready";
        }, 5000);

    </script>
    <div class="toast-container" id="toastContainer"></div>
    <script src="js/notifications.js"></script>
</body>

</html>
