<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - Queue Status</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="top-bar">
        <div class="top-left">
            <span class="welcome-text">Queue Status</span>
        </div>
        <div class="top-center">
            <a href="dashboard.html" style="text-decoration:none;"><h1>QueueSmart</h1></a>
        </div>
        <div class="top-right">
            <button class="icon-btn" id="adminToggleBtn" title="Admin Panel" onclick="window.location.href='admin-dashboard.html'" style="display:none;">👨🏻‍💻</button>
            <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="dashboard">
        <div class="card-grid">
            <section class="card">
                <h2>Queue Status</h2>

                <p><strong>Service:</strong> <span id="serviceName">Loading...</span></p>
                <p><strong>People Ahead:</strong> <span id="peopleAhead">-</span></p>
                <p><strong>Current Position:</strong> <span id="position">-</span></p>
                <p><strong>Estimated Wait:</strong> <span id="wait">-</span></p>
                <p><strong>Status:</strong> <span id="status" class="status">-</span></p>

                <div class="progress" aria-label="Queue progress">
                    <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
                </div>

                <button class="primary-btn" onclick="leaveQueue()">Leave Queue</button>
            </section>
        </div>
    </main>

    <script>
        let currentQueue = null;

        function getStoredUser() {
            const raw =
                localStorage.getItem('queuesmartUser') ||
                localStorage.getItem('user');

            if (!raw) return null;

            try {
                return JSON.parse(raw);
            } catch {
                return null;
            }
        }

        function getUserId(user) {
            if (!user) return null;
            return user.userId || user.id || null;
        }

        function setQueueUI(queue, totalInQueue) {
            document.getElementById('serviceName').innerText = queue.serviceName || 'Unknown Service';
            document.getElementById('peopleAhead').innerText = queue.peopleAhead ?? 0;
            document.getElementById('position').innerText = `#${queue.position}`;
            document.getElementById('wait').innerText = `${queue.estimatedWaitMinutes} minutes`;

            const statusEl = document.getElementById('status');
            statusEl.innerText = queue.status;
            statusEl.className = `status ${queue.status}`;

            // Progress bar: how close to the front are you?
            // Position 1 = 100%, last in queue = lowest %
            let fillPercent;
            if (totalInQueue && totalInQueue > 0) {
                // Accurate: based on actual total queue size
                fillPercent = Math.round(((totalInQueue - queue.position + 1) / totalInQueue) * 100);
            } else {
                // Fallback: position 1 = 100%, decreases by 10% per position
                fillPercent = Math.max(5, 100 - ((queue.position - 1) * 10));
            }
            document.getElementById('progressFill').style.width = `${fillPercent}%`;
        }

        function setNoQueueUI() {
            document.getElementById('serviceName').innerText = 'No active queue';
            document.getElementById('peopleAhead').innerText = '-';
            document.getElementById('position').innerText = '-';
            document.getElementById('wait').innerText = '-';
            document.getElementById('status').innerText = 'Not in queue';
            document.getElementById('status').className = 'status';
            document.getElementById('progressFill').style.width = '0%';
        }

        async function loadCurrentQueue() {
            const user = getStoredUser();
            const userId = getUserId(user);

            if (!userId) {
                setNoQueueUI();
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/api/queue/current/${userId}`);
                const data = await response.json();

                if (!response.ok || !data.success) {
                    currentQueue = null;
                    setNoQueueUI();
                    return;
                }

                currentQueue = data.queue;

                // Fetch total queue size so the progress bar is accurate
                try {
                    const qRes = await fetch(`http://localhost:3000/api/queue/service/${currentQueue.serviceId}`);
                    const qData = await qRes.json();
                    const totalInQueue = qData.success ? qData.entries.length : null;
                    setQueueUI(currentQueue, totalInQueue);
                } catch {
                    setQueueUI(currentQueue, null);
                }

            } catch (err) {
                console.error('Failed to load current queue:', err);
                currentQueue = null;
                setNoQueueUI();
            }
        }

        async function leaveQueue() {
            if (!currentQueue) {
                alert('You are not currently in a queue.');
                return;
            }

            const user = getStoredUser();
            const userId = getUserId(user);

            if (!userId || !currentQueue.serviceId) {
                alert('Missing queue information.');
                return;
            }

            if (!confirm('Leave your current queue?')) {
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/queue/leave', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId,
                        serviceId: currentQueue.serviceId
                    })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    alert(data.error || 'Failed to leave queue.');
                    return;
                }

                alert('You left the queue.');
                currentQueue = null;
                setNoQueueUI();
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error('Failed to leave queue:', err);
                alert('Server error while leaving queue.');
            }
        }

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('user');
                localStorage.removeItem('token');
                localStorage.removeItem('queuesmartUser');
                window.location.href = 'index.html';
            }
        }

        function isAdminUser(user) {
            if (!user || !user.role) return false;
            return ["admin","administrator"].includes(String(user.role).toLowerCase());
        }
        function setupAdminToggle() {
            const btn = document.getElementById("adminToggleBtn");
            if (!btn) return;
            if (isAdminUser(getStoredUser())) btn.style.display = "flex";
        }

        setupAdminToggle();
        loadCurrentQueue();
        setInterval(loadCurrentQueue, 5000);
    </script>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/notifications.js"></script>
</body>
</html>
