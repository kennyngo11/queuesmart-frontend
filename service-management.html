<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - Service Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="dashboard">
    <header class="top-bar">
        <div class="top-left">
            <span class="admin-panel-title">Admin Panel</span>
        </div>
        <div class="top-center">
            <a href="dashboard.html" style="text-decoration:none;"><h1 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin: 0;">QueueSmart</h1></a>
        </div>
        <div class="top-right" style="align-items: center;">
            <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()" style="margin-top:0; vertical-align:middle;">Logout</button>
        </div>
    </header>
    <div class="card fade-in">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom: 24px;">
            <button class="primary-btn" style="width:auto; padding:10px 16px;" onclick="window.location.href='admin-dashboard.html'">Back</button>
            <h3 style="text-align:center; font-size:1.45rem; margin: 0; flex:1;">Service Management</h3>
            <div style="width:96px;"></div>
        </div>
        <form id="serviceForm" novalidate style="margin-top: 22px;">
            <div class="form-group">
                <label for="serviceName">Service Name <span style="color:#ef4444">*</span></label>
                <input type="text" id="serviceName" name="serviceName" maxlength="100" required>
                <div class="error-message" id="serviceNameError"></div>
            </div>
            <div class="form-group">
                <label for="description">Description <span style="color:#ef4444">*</span></label>
                <textarea id="description" name="description" required maxlength="300"></textarea>
                <div class="error-message" id="descriptionError"></div>
            </div>
            <div class="form-group">
                <label for="duration">Expected Duration (minutes) <span style="color:#ef4444">*</span></label>
                <input type="number" id="duration" name="duration" min="1" max="240" required>
                <div class="error-message" id="durationError"></div>
            </div>
            <div class="form-group">
                <label for="priority">Priority Level <span style="color:#ef4444">*</span></label><br>
                <select id="priority" name="priority" required style="margin-top:0px; width:160px; display:block;">
                    <option value="">Select priority</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <div class="error-message" id="priorityError"></div>
            </div>
            <button type="submit" class="primary-btn">Create / Edit Service</button>
        </form>
        <div id="serviceList" style="margin-top:32px;"></div>
    </div>
</main>
<div class="toast-container" id="toastContainer"></div>
<script>
function logout() {
    if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem("user");
        localStorage.removeItem("token");
        localStorage.removeItem("queuesmartUser");
        window.location.href = "index.html";
    }
}
</script>
<script src="js/notifications.js"></script>
<script src="js/service-management.js"></script>
</body>
</html>
