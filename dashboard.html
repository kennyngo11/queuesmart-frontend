<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - User Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="top-bar">
    <div class="top-left">
        <span class="welcome-text">Welcome back</span>
    </div>
    <div class="top-center">
        <a href="dashboard.html" style="text-decoration:none;"><h1>QueueSmart</h1></a>
    </div>
    <div class="top-right">
        <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
        <div class="notif-wrapper" id="notifWrapper">
            <button class="icon-btn" id="notifBtn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
            <span class="notif-badge" id="notifBadge"></span>
            <div class="notif-panel" id="notifPanel">
                <div class="notif-header">
                    <h3>Notifications</h3>
                    <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                </div>
                <div class="notif-list" id="notifList"></div>
                <div class="notif-footer">
                    <button onclick="clearAllNotifications()">Clear all</button>
                </div>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<main class="dashboard">
    <div class="card-grid">
        <div class="card">
            <h3>Current Queue</h3>
            <p><strong>Position:</strong> #3</p>
            <p><strong>Estimated Wait:</strong> 15 minutes</p>
            <span class="status waiting">Waiting</span>
        </div>
        <div class="card">
            <h3>Available Services</h3>
            <ul>
                <li onclick="toggleService(this)" data-name="Academic Advising">Academic Advising</li>
                <li onclick="toggleService(this)" data-name="IT Help Desk">IT Help Desk</li>
                <li onclick="toggleService(this)" data-name="Student Services">Student Services</li>
            </ul>
            <button class="primary-btn" onclick="joinSelectedQueue()">Join a Queue</button>
        </div>
    </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="js/notifications.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
