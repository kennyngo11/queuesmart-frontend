<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - User Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="top-bar">
    <div class="top-left">
        <span class="welcome-text">Welcome back</span>
    </div>
    <div class="top-center">
        <a href="dashboard.html" style="text-decoration:none;"><h1>QueueSmart</h1></a>
    </div>
    <div class="top-right">
        <button class="icon-btn" id="adminToggleBtn" title="Admin Panel" onclick="toggleAdminPanel()" style="display:none;">👨🏻‍💻</button>
        <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
        <div class="notif-wrapper" id="notifWrapper">
            <button class="icon-btn" id="notifBtn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
            <span class="notif-badge" id="notifBadge"></span>
            <div class="notif-panel" id="notifPanel">
                <div class="notif-header">
                    <h3>Notifications</h3>
                    <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                </div>
                <div class="notif-list" id="notifList"></div>
                <div class="notif-footer">
                    <button onclick="clearAllNotifications()">Clear all</button>
                </div>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<main class="dashboard">
    <div class="card-grid">
        <div class="card">
            <h2>Current Queue</h2>
            <p><strong>Service:</strong> <span id="dashServiceName">Loading...</span></p>
            <p><strong>Position:</strong> <span id="dashPosition">-</span></p>
            <p><strong>Estimated Wait:</strong> <span id="dashWait">-</span></p>
            <p><strong>Status:</strong> <span id="dashStatus">-</span></p>
            <button class="primary-btn" onclick="window.location.href='queue-status.html'">
                View Queue Status
            </button>
        </div>

        <div class="card">
            <h3>Available Services</h3>
            <ul id="servicesList">
                <li>Loading services...</li>
            </ul>
            <button class="primary-btn" onclick="joinSelectedQueue()">Join a Queue</button>
        </div>
    </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="js/notifications.js"></script>

<script>
    let selectedService = null;
    let availableServices = [];

    function getStoredUser() {
        const raw =
            localStorage.getItem('queuesmartUser') ||
            localStorage.getItem('user');

        if (!raw) return null;

        try {
            return JSON.parse(raw);
        } catch {
            return null;
        }
    }

    function getUserId(user) {
        if (!user) return null;
        return user.userId || user.id || null;
    }

    function isAdminUser(user) {
        if (!user || !user.role) return false;
        const role = String(user.role).toLowerCase();
        return role === 'admin' || role === 'administrator';
    }

    function toggleAdminPanel() {
        window.location.href = 'admin-dashboard.html';
    }

    function setupAdminToggle() {
        const btn = document.getElementById('adminToggleBtn');
        if (!btn) return;
        const user = getStoredUser();
        if (isAdminUser(user)) {
            btn.style.display = 'flex';
        }
    }

    function setDashboardQueue(queue) {
        document.getElementById('dashServiceName').innerText = queue.serviceName || 'Unknown Service';
        document.getElementById('dashPosition').innerText = `#${queue.position}`;
        document.getElementById('dashWait').innerText = `${queue.estimatedWaitMinutes} minutes`;
        document.getElementById('dashStatus').innerText = queue.status;
    }

    function setNoDashboardQueue() {
        document.getElementById('dashServiceName').innerText = 'No active queue';
        document.getElementById('dashPosition').innerText = '-';
        document.getElementById('dashWait').innerText = '-';
        document.getElementById('dashStatus').innerText = '-';
    }

    async function loadDashboardQueueSummary() {
        const user = getStoredUser();
        const userId = getUserId(user);

        if (!userId) {
            setNoDashboardQueue();
            return;
        }

        try {
            const response = await fetch(`http://localhost:3000/api/queue/current/${userId}`);
            const data = await response.json();

            if (!response.ok || !data.success) {
                setNoDashboardQueue();
                return;
            }

            setDashboardQueue(data.queue);
        } catch (err) {
            console.error('Failed to load queue summary:', err);
            setNoDashboardQueue();
        }
    }

    function renderServices(services) {
        const list = document.getElementById('servicesList');
        list.innerHTML = '';

        if (!services.length) {
            list.innerHTML = '<li>No available services</li>';
            return;
        }

        services.forEach(service => {
            const waitMinutes = (service.queueLength || 0) * (service.duration || 0);
            const waitLabel = waitMinutes === 0
                ? '<span style="color:#10b981; font-size:0.8rem; margin-left:8px;">No wait</span>'
                : `<span style="color:#f59e0b; font-size:0.8rem; margin-left:8px;">${waitMinutes} min wait</span>`;

            const li = document.createElement('li');
            li.style.display = 'flex';
            li.style.justifyContent = 'space-between';
            li.style.alignItems = 'center';
            li.innerHTML = `<span>${service.serviceName}</span>${waitLabel}`;
            li.dataset.serviceId = service.id;
            li.dataset.name = service.serviceName;
            li.onclick = function () {
                toggleService(li);
            };
            list.appendChild(li);
        });
    }

    async function loadServices() {
        try {
            const response = await fetch('http://localhost:3000/api/services');
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to load services');
            }

            // If backend returns all services, keep only active ones for user dashboard
            availableServices = data.filter(service => Number(service.isActive) === 1 || service.isActive === true);

            renderServices(availableServices);

            // Restore selection after re-render
            if (selectedService) {
                const items = document.querySelectorAll('#servicesList li');
                items.forEach(li => {
                    if (Number(li.dataset.serviceId) === selectedService.serviceId) {
                        li.classList.add('selected');
                        selectedService.element = li;
                    }
                });
            }
        } catch (err) {
            console.error('Failed to load services:', err);
            document.getElementById('servicesList').innerHTML = '<li>Failed to load services</li>';
        }
    }

    function toggleService(element) {
        const allItems = document.querySelectorAll('#servicesList li');
        allItems.forEach(item => item.classList.remove('selected'));

        if (selectedService && selectedService.element === element) {
            selectedService = null;
            return;
        }

        element.classList.add('selected');
        selectedService = {
            element,
            serviceId: Number(element.dataset.serviceId),
            serviceName: element.dataset.name
        };
    }

    async function joinSelectedQueue() {
        const user = getStoredUser();
        const userId = getUserId(user);

        if (!userId) {
            alert('You must be logged in.');
            return;
        }

        if (!selectedService) {
            alert('Please select a service first.');
            return;
        }

        try {
            const response = await fetch('http://localhost:3000/api/queue/join', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    userId,
                    serviceId: selectedService.serviceId
                })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                alert(data.error || 'Failed to join queue.');
                return;
            }

            alert(`Joined ${selectedService.serviceName} successfully.`);
            await loadDashboardQueueSummary();
        } catch (err) {
            console.error('Failed to join queue:', err);
            alert('Server error while joining queue.');
        }
    }

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            localStorage.removeItem('queuesmartUser');
            window.location.href = 'index.html';
        }
    }

    loadDashboardQueueSummary();
    loadServices();
    setupAdminToggle();
    setInterval(() => { loadDashboardQueueSummary(); loadServices(); }, 5000);
</script>
</body>
</html>
