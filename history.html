<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="top-bar">
        <div class="top-left">
            <span class="welcome-text">History</span>
        </div>
        <div class="top-center">
            <a href="dashboard.html" style="text-decoration:none;"><h1>QueueSmart</h1></a>
        </div>
        <div class="top-right">
            <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>
    <main class="dashboard">
        <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
            <button class="logout-btn" onclick="clearHistory()">Clear History</button>
        </div>
        <div class="history-list" id="historyList">
        </div>
    </main>
<div class="toast-container" id="toastContainer"></div>
<script>
function logout() {
    if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem("user");
        localStorage.removeItem("token");
        localStorage.removeItem("queuesmartUser");
        window.location.href = "index.html";
    }
}

function formatDate(isoString) {
    const d = new Date(isoString);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
           ', ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function loadHistory() {
    const list = document.getElementById('historyList');
    const user = JSON.parse(localStorage.getItem('queuesmartUser') || '{}');
    const historyKey = `queueHistory_${user.id}`;
    const history = JSON.parse(localStorage.getItem(historyKey) || '[]');

    if (history.length === 0) {
        list.innerHTML = '<div class="card" style="text-align:center; color:#6b7280; padding:40px;">No queue history yet. Join a queue from the dashboard to see your history here.</div>';
        return;
    }

    list.innerHTML = history.map(h => `
        <article class="history-card">
            <div class="history-main">
                <h4>${h.serviceName}</h4>
            </div>
            <div class="history-meta">
                <span>${formatDate(h.joinedAt)}</span>
                <span class="status ${h.status}">${h.status.charAt(0).toUpperCase() + h.status.slice(1)}</span>
            </div>
        </article>
    `).join('');
}

function clearHistory() {
    if (confirm('Are you sure you want to clear your history?')) {
        const user = JSON.parse(localStorage.getItem('queuesmartUser') || '{}');
        const historyKey = `queueHistory_${user.id}`;
        localStorage.removeItem(historyKey);
        loadHistory();
    }
}

loadHistory();
</script>
<script src="js/notifications.js"></script>
</body>

</html>
