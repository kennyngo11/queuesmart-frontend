<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="top-bar">
        <div class="top-left">
            <span class="welcome-text">History</span>
        </div>
        <div class="top-center">
            <a href="dashboard.html" style="text-decoration:none;"><h1>QueueSmart</h1></a>
        </div>
        <div class="top-right">
            <button class="icon-btn" id="adminToggleBtn" title="Admin Panel" onclick="window.location.href='admin-dashboard.html'" style="display:none;">👨🏻‍💻</button>
            <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>
    <main class="dashboard">
        <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
            <button class="logout-btn" onclick="clearHistory()">Clear History</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </main>

<div class="toast-container" id="toastContainer"></div>

<script>
function getStoredUser() {
    const raw = localStorage.getItem('queuesmartUser') || localStorage.getItem('user');
    if (!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
}

function isAdminUser(user) {
    if (!user || !user.role) return false;
    const role = String(user.role).toLowerCase();
    return role === 'admin' || role === 'administrator';
}

function setupAdminToggle() {
    const btn = document.getElementById('adminToggleBtn');
    if (!btn) return;
    const user = getStoredUser();
    if (isAdminUser(user)) btn.style.display = 'flex';
}

function logout() {
    if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem("user");
        localStorage.removeItem("token");
        localStorage.removeItem("queuesmartUser");
        window.location.href = "index.html";
    }
}

function formatDate(isoString) {
    const d = new Date(isoString);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
           ', ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

async function loadHistory() {
    const list = document.getElementById('historyList');
    const user = getStoredUser();
    const userId = user && (user.userId || user.id);

    if (!userId) {
        list.innerHTML = '<div class="card" style="text-align:center; color:#6b7280; padding:40px;">Please log in to view history.</div>';
        return;
    }

    try {
        const response = await fetch(`http://localhost:3000/api/history/${userId}`);
        const data = await response.json();

        if (!data.success) {
            list.innerHTML = '<div class="card" style="text-align:center; color:#6b7280; padding:40px;">Failed to load history.</div>';
            return;
        }

        // Get the "cleared at" timestamp for this user, if they ever cleared history
        const clearedAt = localStorage.getItem(`historyClearedAt_${userId}`);

        // Only show entries that were joined after the last clear
        const visible = clearedAt
            ? data.history.filter(h => new Date(h.joinedAt) > new Date(clearedAt))
            : data.history;

        if (!visible.length) {
            list.innerHTML = '<div class="card" style="text-align:center; color:#6b7280; padding:40px;">No queue history yet. Join a queue from the dashboard to see your history here.</div>';
            return;
        }

        list.innerHTML = visible.map(h => `
            <article class="history-card">
                <div class="history-main">
                    <h4>${h.serviceName}</h4>
                </div>
                <div class="history-meta">
                    <span>${formatDate(h.joinedAt)}</span>
                    <span class="status ${h.status}">${h.status.charAt(0).toUpperCase() + h.status.slice(1)}</span>
                </div>
            </article>
        `).join('');

    } catch (err) {
        console.error('Failed to load history:', err);
        list.innerHTML = '<div class="card" style="text-align:center; color:#6b7280; padding:40px;">Failed to load history.</div>';
    }
}

function clearHistory() {
    if (confirm('Are you sure you want to clear your history?')) {
        const user = getStoredUser();
        const userId = user && (user.userId || user.id);
        if (!userId) return;

        // Save the current timestamp — any entry before this will be hidden on the frontend
        // The data still remains in the database
        localStorage.setItem(`historyClearedAt_${userId}`, new Date().toISOString());

        loadHistory();
    }
}

setupAdminToggle();
loadHistory();
</script>
<script src="js/notifications.js"></script>
</body>

</html>
