<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - Queue Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="dashboard">
    <header class="top-bar">
        <div class="top-left">
            <span class="admin-panel-title">Admin Panel</span>
        </div>
        <div class="top-center">
            <h1 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin: 0;">QueueSmart</h1>
        </div>
        <div class="top-right" style="align-items: center;">
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()" style="margin-top:0; vertical-align:middle;">Logout</button>
        </div>
    </header>
    <div class="card fade-in">
        <h3 style="text-align:center; font-size:1.45rem; margin-bottom: 24px; margin-top: 0;">Queue Management</h3>
        <div class="select-service" style="margin-top: 22px;">
    <label for="serviceSelect" style="display: block; margin-bottom: 6px;"><strong>Select Service:</strong></label>
    <select id="serviceSelect">
                <option value="Academic Advising">Academic Advising</option>
                <option value="IT Help Desk">IT Help Desk</option>
                <option value="Student Services">Student Services</option>
            </select>
        </div>
        <table class="queue-table">
            <thead>
                <tr>
                    <th>Position</th>
                    <th>User Email</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="queueBody">
                <tr>
                    <td>1</td>
                    <td><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="afcec3c6cccaefcad7cec2dfc3ca81ccc0c2">[email&#160;protected]</a></td>
                    <td>Waiting</td>
                    <td class="queue-actions">
                        <button class="action-btn serve">Serve Next</button>
                        <button class="action-btn remove">Remove</button>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="debcb1bc9ebba6bfb3aeb2bbf0bdb1b3">[email&#160;protected]</a></td>
                    <td>Waiting</td>
                    <td class="queue-actions">
                        <button class="action-btn">Move Up</button>
                        <button class="action-btn">Move Down</button>
                        <button class="action-btn remove">Remove</button>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="d6b5beb7a4babfb396b3aeb7bba6bab3f8b5b9bb">[email&#160;protected]</a></td>
                    <td>Waiting</td>
                    <td class="queue-actions">
                        <button class="action-btn">Move Up</button>
                        <button class="action-btn">Move Down</button>
                        <button class="action-btn remove">Remove</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    function logout() {
        alert('Logout functionality would be implemented here');
    }

    // UI simulation for Serve Next
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('queueBody').addEventListener('click', function(e) {
            if (e.target.classList.contains('serve')) {
                const row = e.target.closest('tr');
                const userEmail = row.querySelector('td:nth-child(2)').textContent;
                row.remove();
                alert('Served next user: ' + userEmail);
                // Optionally, renumber positions
                Array.from(document.querySelectorAll('#queueBody tr')).forEach((tr, idx) => {
                    tr.querySelector('td').textContent = idx + 1;
                });
            }
        });

        // Remove simulation for other actions
        document.querySelectorAll('.action-btn.remove').forEach(btn => {
            btn.addEventListener('click', function() {
                const row = this.closest('tr');
                row.remove();
            });
        });

        document.getElementById('serviceSelect').addEventListener('change', function() {
            alert('Queue data would update for: ' + this.value);
        });
    });
</script>
<div class="toast-container" id="toastContainer"></div>
<script src="js/notifications.js"></script>
</body>
</html>
