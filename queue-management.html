<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueSmart - Queue Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="top-bar">
        <div class="top-left">
            <span class="admin-panel-title">Admin Panel</span>
        </div>
        <div class="top-center">
            <a href="dashboard.html" style="text-decoration:none;"><h1 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin: 0;">QueueSmart</h1></a>
        </div>
        <div class="top-right" style="align-items: center;">
            <button class="icon-btn" title="History" onclick="window.location.href='history.html'">📋</button>
            <div class="notif-wrapper" id="notifWrapper">
                <button class="icon-btn" title="Notifications" onclick="toggleNotifPanel()">🔔</button>
                <span class="notif-badge" id="notifBadge"></span>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="mark-all-btn" onclick="markAllAsRead()">Mark all as read</button>
                    </div>
                    <div class="notif-list" id="notifList"></div>
                    <div class="notif-footer">
                        <button onclick="clearAllNotifications()">Clear all</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()" style="margin-top:0; vertical-align:middle;">Logout</button>
        </div>
    </header>
<main class="dashboard">
    <div class="card fade-in">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom: 24px;">
            <button class="primary-btn" style="width:auto; padding:10px 16px;" onclick="window.location.href='admin-dashboard.html'">Back</button>
            <h3 style="text-align:center; font-size:1.45rem; margin: 0; flex:1;">Queue Management</h3>
            <div style="width:96px;"></div>
        </div>
        <div class="select-service" style="margin-top: 22px;">
    <label for="serviceSelect" style="display: block; margin-bottom: 6px;"><strong>Select Service:</strong></label>
    <select id="serviceSelect">
                <option value="Academic Advising">Academic Advising</option>
                <option value="IT Help Desk">IT Help Desk</option>
                <option value="Student Services">Student Services</option>
            </select>
        </div>
        <table class="queue-table">
            <thead>
                <tr>
                    <th>Position</th>
                    <th>User Email</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="queueBody">
                <tr>
                    <td>1</td>
                    <td><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="afcec3c6cccaefcad7cec2dfc3ca81ccc0c2">[email&#160;protected]</a></td>
                    <td>Waiting</td>
                    <td class="queue-actions">
                        <button class="action-btn serve">Serve Next</button>
                        <button class="action-btn remove">Remove</button>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="debcb1bc9ebba6bfb3aeb2bbf0bdb1b3">[email&#160;protected]</a></td>
                    <td>Waiting</td>
                    <td class="queue-actions">
                        <button class="action-btn">Move Up</button>
                        <button class="action-btn">Move Down</button>
                        <button class="action-btn remove">Remove</button>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="d6b5beb7a4babfb396b3aeb7bba6bab3f8b5b9bb">[email&#160;protected]</a></td>
                    <td>Waiting</td>
                    <td class="queue-actions">
                        <button class="action-btn">Move Up</button>
                        <button class="action-btn">Move Down</button>
                        <button class="action-btn remove">Remove</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
const API_BASE_URL = 'http://localhost:3000/api';
const serviceSelect = document.getElementById('serviceSelect');
const queueBody = document.getElementById('queueBody');

function logout() {
    if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem("user");
        localStorage.removeItem("token");
        localStorage.removeItem("queuesmartUser");
        window.location.href = "index.html";
    }
}

function renderQueue(entries) {
    if (!entries.length) {
        queueBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#6b7280; padding:24px;">No users waiting in this queue.</td></tr>';
        return;
    }

    queueBody.innerHTML = entries.map((entry, index) => {
        const isFirst = index === 0;
        const isLast = index === entries.length - 1;
        return `
            <tr>
                <td>${entry.position}</td>
                <td>${entry.email}</td>
                <td>Waiting</td>
                <td class="queue-actions">
                    ${isFirst ? `<button class="action-btn serve" data-action="serve">Serve Next</button>` : ''}
                    <button class="action-btn" data-action="up" data-entry-id="${entry.queueEntryId}" ${isFirst ? 'disabled' : ''}>Move Up</button>
                    <button class="action-btn" data-action="down" data-entry-id="${entry.queueEntryId}" ${isLast ? 'disabled' : ''}>Move Down</button>
                    <button class="action-btn remove" data-action="remove" data-entry-id="${entry.queueEntryId}">Remove</button>
                </td>
            </tr>
        `;
    }).join('');
}

async function loadQueueEntries(serviceId) {
    queueBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:24px;">Loading queue...</td></tr>';

    try {
        const response = await fetch(`${API_BASE_URL}/queue/service/${serviceId}`);
        const data = await response.json();

        if (!response.ok || !data.success) {
            throw new Error(data.error || 'Failed to load queue');
        }

        renderQueue(data.entries || []);
    } catch (err) {
        console.error('Failed to load queue:', err);
        queueBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#ef4444; padding:24px;">Failed to load queue.</td></tr>';
    }
}

async function loadServices() {
    try {
        const response = await fetch(`${API_BASE_URL}/services`);
        const services = await response.json();

        if (!response.ok || !Array.isArray(services)) {
            throw new Error('Failed to load services');
        }

        serviceSelect.innerHTML = services.map(service => (
            `<option value="${service.id}">${service.serviceName}</option>`
        )).join('');

        if (services.length) {
            await loadQueueEntries(services[0].id);
        } else {
            queueBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#6b7280; padding:24px;">No services available.</td></tr>';
        }
    } catch (err) {
        console.error('Failed to load services:', err);
        queueBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#ef4444; padding:24px;">Failed to load services.</td></tr>';
    }
}

queueBody.addEventListener('click', async (event) => {
    const action = event.target.dataset.action;
    const entryId = event.target.dataset.entryId;

    if (!action) return;
    if (action !== 'serve' && !entryId) return;

    try {
        if (action === 'serve') {
            const serviceId = serviceSelect.value;
            if (!serviceId) return;
            const response = await fetch(`${API_BASE_URL}/queue/serve-next/${serviceId}`, {
                method: 'POST'
            });
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data.error || 'Failed to serve next user');
            }
        } else if (action === 'remove') {
            if (!confirm('Remove this user from the queue?')) return;
            const response = await fetch(`${API_BASE_URL}/queue/entry/${entryId}/remove`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data.error || 'Failed to remove user');
            }
        } else if (action === 'up' || action === 'down') {
            const response = await fetch(`${API_BASE_URL}/queue/entry/${entryId}/move`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ direction: action })
            });
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data.error || 'Failed to move user');
            }
        }

        await loadQueueEntries(serviceSelect.value);
    } catch (err) {
        console.error('Queue action failed:', err);
        alert(err.message || 'Queue action failed.');
    }
});

serviceSelect.addEventListener('change', () => {
    loadQueueEntries(serviceSelect.value);
});

loadServices();
</script>
<div class="toast-container" id="toastContainer"></div>
<script src="js/notifications.js"></script>
</body>
</html>
